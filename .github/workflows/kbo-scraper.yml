name: KBO Daily Scraper

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 한국시간 오전 8시
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install selenium webdriver-manager

      - name: 1) Daily data collection
        run: python scripts/daily_collect_v2.py

      - name: 2) Daily prediction
        run: python scripts/daily_predict.py
        continue-on-error: true   # 예측 실패해도 다음 단계 진행

      - name: 3) Update accuracy log
        run: python scripts/update_accuracy.py
        continue-on-error: true

      - name: Commit & push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ kbo_data/ || true
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — commit 건너뜀"
          else
            git commit -m "🤖 Auto-update KBO data $(date +'
