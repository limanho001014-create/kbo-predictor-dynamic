name: Weekly Model Retrain

# 매주 일요일 한국 시간 06:00 (UTC 21:00 토요일)
on:
  schedule:
    - cron: '0 21 * * 6'  # UTC Sat 21:00 = KST Sun 06:00
  workflow_dispatch:  # 수동 실행 가능

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install scikit-learn pandas joblib
      
      - name: Build training dataset from accumulated data
        run: python build_kbo_dataset_v3.py
        continue-on-error: true
      
      - name: Retrain model
        run: python train_kbo_v3.py
        continue-on-error: true
      
      - name: Commit updated model
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add model/ data/
          git diff --staged --quiet || git commit -m "Weekly retrain: $(date -u +'%Y-%m-%d')"
          git push
